name: crawlee-olx

services:
  postgres:
    image: postgres:16
    container_name: crawlee-postgres
    environment:
      POSTGRES_DB: crawlee
      POSTGRES_USER: crawlee
      POSTGRES_PASSWORD: crawlee
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawlee -d crawlee"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crawlee-bot
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: ./docker/.env
        required: true

volumes:
  postgres_data:
